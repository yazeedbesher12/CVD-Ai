<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CVD.AI — PulseGuard AI 3D Simulation (30s)</title>
  <style>
    :root{
      --bg:#061827;
      --card:rgba(255,255,255,.13);
      --stroke:rgba(255,255,255,.22);
      --text:#f5fbff;
      --muted:rgba(245,251,255,.76);
      --teal:#18c8c8;
      --blue:#24a3ff;
      --navy:#0a1f33;
      --green:#25d889;
      --orange:#ffb84d;
      --red:#ff4d67;
      --shadow:0 22px 55px rgba(0,0,0,.36);
      --radius:20px;
    }
    html,body{
      height:100%; margin:0; overflow:hidden;
      background:
        radial-gradient(1000px 700px at 25% 10%, rgba(24,200,200,.23), transparent 58%),
        radial-gradient(950px 650px at 72% 30%, rgba(255,77,103,.14), transparent 60%),
        radial-gradient(900px 650px at 50% 92%, rgba(36,163,255,.13), transparent 60%),
        var(--bg);
      font-family:system-ui,-apple-system,Segoe UI,Arial,"Noto Sans Arabic",sans-serif;
    }
    #c{position:fixed; inset:0; display:block}
    .ui{position:fixed; inset:0; pointer-events:none; color:var(--text); padding:18px; display:grid; grid-template-rows:auto 1fr auto; gap:12px}
    .topbar{display:flex; justify-content:space-between; align-items:flex-start; gap:12px}
    .pill{
      display:inline-flex; align-items:center; gap:8px; padding:9px 12px; border-radius:999px;
      background:rgba(24,200,200,.14); border:1px solid rgba(24,200,200,.36);
      font-weight:950; font-size:11px; box-shadow:var(--shadow); user-select:none; backdrop-filter:blur(10px);
    }
    .bigTitle{font-size:16px; font-weight:1100; letter-spacing:.2px; margin-top:10px}
    .subtitle{max-width:min(860px,92vw); line-height:1.7; font-weight:800; font-size:11.2px; color:var(--muted)}
    .card{
      width:min(560px, 90vw); align-self:start; justify-self:end;
      background:linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,.08));
      border:1px solid var(--stroke); border-radius:var(--radius); box-shadow:var(--shadow);
      backdrop-filter: blur(12px); overflow:hidden; opacity:0; transition:opacity .42s ease, transform .42s ease, width .35s ease;
      --tx:0px; --ty:0px;
      transform:translate(var(--tx), calc(var(--ty) + 4px));
    }
    .card.show{opacity:1; transform:translate(var(--tx), var(--ty))}
    .card .hd{padding:11px 13px; border-bottom:1px solid rgba(255,255,255,.12); font-weight:950; display:flex; justify-content:space-between; align-items:center; gap:10px}
    .badge{padding:6px 10px; border-radius:999px; background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.20); font-weight:900; font-size:11px; white-space:nowrap}
    .card .bd{padding:11px 13px; display:grid; gap:8px}
    .row{display:flex; justify-content:space-between; gap:14px; align-items:center}
    .muted{color:var(--muted); font-weight:800; font-size:11px}
    .val{font-weight:1000; text-align:left; direction:ltr}
    .tags{display:flex; gap:8px; flex-wrap:wrap}
    .tag{display:inline-flex; align-items:center; gap:7px; padding:6px 9px; border-radius:999px; border:1px solid rgba(255,255,255,.18); background:rgba(0,0,0,.14); font-weight:900; font-size:11px}
    .good{border-color:rgba(37,216,137,.50); background:rgba(37,216,137,.15)}
    .warn{border-color:rgba(255,184,77,.58); background:rgba(255,184,77,.16)}
    .bad{border-color:rgba(255,77,103,.62); background:rgba(255,77,103,.17)}
    .info{border-color:rgba(24,200,200,.42); background:rgba(24,200,200,.13)}
    .bar{height:10px; border-radius:999px; background:rgba(255,255,255,.12); overflow:hidden; border:1px solid rgba(255,255,255,.12)}
    .bar span{display:block; height:100%; border-radius:999px; background:linear-gradient(90deg, var(--teal), var(--blue)); width:50%}
    .bar.red span{background:linear-gradient(90deg, #ff8999, var(--red))}
    .bar.orange span{background:linear-gradient(90deg, #ffd68d, var(--orange))}
    .caption{
      width:min(900px,92vw); margin:auto; padding:12px 15px; border-radius:var(--radius);
      background:rgba(0,0,0,.30); border:1px solid rgba(255,255,255,.16); box-shadow:var(--shadow);
      backdrop-filter: blur(10px); opacity:0; transition:opacity .42s ease; user-select:none;
      text-align:center; font-weight:850; line-height:1.65; color:var(--text); font-size:13px;
    }
    .caption.show{opacity:1}
    .ctaWrap{position:fixed; left:18px; bottom:18px; display:flex; gap:10px; pointer-events:auto; z-index:5}
    button{
      border:none; cursor:pointer; padding:12px 14px; border-radius:15px; font-weight:1000;
      color:#031827; background:linear-gradient(135deg,#47f7e8,#18c8c8); box-shadow:0 20px 48px rgba(24,200,200,.25);
    }
    button.secondary{color:var(--text); background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.20); box-shadow:0 18px 45px rgba(0,0,0,.24)}
    @media (max-width:720px){.bigTitle{font-size:14px}.subtitle{font-size:10.5px}.card{width:96vw}.ui{padding:12px}.ctaWrap{left:12px; bottom:12px}.pill{font-size:11px}}
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ui">
  <div class="topbar">
    <div>
      <div class="pill">CVD.AI • PulseGuard AI • ECG Early Risk Alert • 30s</div>
      <div class="bigTitle">سيميوليشن عرض مشروع CVD.AI — من الساعة الذكية إلى نتيجة الخطر ولوحة الأدمن ✦</div>
      <div class="subtitle">Smartwatch ECG → preprocessing → R-peaks/RR/QRS features → LSTM AI score → 70% ECG + 30% profile → risk level + admin alert.</div>
    </div>
    <div class="pill" id="timerPill">00:00</div>
  </div>

  <div class="card" id="panel">
    <div class="hd"><div id="panelTitle">CVD.AI</div><div class="badge" id="panelBadge">ECG → AI → Risk</div></div>
    <div class="bd" id="panelBody"></div>
  </div>

  <div class="caption" id="caption"></div>
</div>
<div class="ctaWrap">
  <button id="playBtn">▶ تشغيل العرض</button>
  <button id="resetBtn" class="secondary">↺ إعادة</button>
</div>

<script type="module">
  import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
  const lerp=(a,b,t)=>a+(b-a)*t;
  const smoothstep=t=>t*t*(3-2*t);
  const now=()=>performance.now()/1000;

  const panel=document.getElementById('panel');
  const panelTitle=document.getElementById('panelTitle');
  const panelBadge=document.getElementById('panelBadge');
  const panelBody=document.getElementById('panelBody');
  const caption=document.getElementById('caption');
  const timerPill=document.getElementById('timerPill');

  function setPanel(show,title,badge,html){
    panel.classList.toggle('show',show); panelTitle.textContent=title||''; panelBadge.textContent=badge||''; panelBody.innerHTML=html||'';
  }
  function setCaption(show,text){caption.classList.toggle('show',show); caption.textContent=text||'';}
  function formatTime(s){return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(Math.floor(s%60)).padStart(2,'0')}`;}

  function setPanelLayout({width='min(560px, 90vw)', tx='0px', ty='0px'}={}){
    panel.style.width=width;
    panel.style.setProperty('--tx', tx);
    panel.style.setProperty('--ty', ty);
  }

  const canvas=document.getElementById('c');
  const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(innerWidth,innerHeight);
  renderer.shadowMap.enabled=true;
  renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=1.25;

  const scene=new THREE.Scene();
  scene.fog=new THREE.FogExp2(0x061827,0.022);

  const camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,0.1,260);
  camera.position.set(0,18,34);
  const camTarget=new THREE.Vector3(0,3,0);

  scene.add(new THREE.HemisphereLight(0xdbfcff,0x0a1f33,0.92));
  const key=new THREE.DirectionalLight(0xffffff,1.35);
  key.position.set(14,24,16); key.castShadow=true; key.shadow.mapSize.set(2048,2048);
  key.shadow.camera.left=-55; key.shadow.camera.right=55; key.shadow.camera.top=55; key.shadow.camera.bottom=-55;
  scene.add(key);
  const rim=new THREE.DirectionalLight(0x63fbff,.44); rim.position.set(-22,12,-20); scene.add(rim);

  // Medical grid floor
  const floorGeo=new THREE.PlaneGeometry(110,80,36,26);
  const floorMat=new THREE.MeshStandardMaterial({color:0x0a2236,roughness:.83,metalness:.06,transparent:true,opacity:.92});
  const floor=new THREE.Mesh(floorGeo,floorMat); floor.rotation.x=-Math.PI/2; floor.receiveShadow=true; scene.add(floor);
  const grid=new THREE.GridHelper(105,35,0x18c8c8,0x1a4260); grid.position.y=.02; grid.material.opacity=.22; grid.material.transparent=true; scene.add(grid);

  const glowMat=new THREE.MeshBasicMaterial({color:0x18c8c8,transparent:true,opacity:.18,side:THREE.DoubleSide});
  const halo=new THREE.Mesh(new THREE.RingGeometry(5.6,5.8,96),glowMat); halo.rotation.x=-Math.PI/2; halo.position.set(0,.05,0); scene.add(halo);

  function roundedRect(ctx,x,y,w,h,r){
    ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
  }

  function makeLabelTexture(draw){
    const c=document.createElement('canvas'); c.width=800; c.height=520;
    const ctx=c.getContext('2d'); draw(ctx,c.width,c.height);
    const tex=new THREE.CanvasTexture(c); tex.colorSpace=THREE.SRGBColorSpace; return {canvas:c,ctx,tex};
  }

  // Phone model with canvas screen
  const phoneGroup=new THREE.Group(); scene.add(phoneGroup); phoneGroup.position.set(-5.7,3.95,1.45); phoneGroup.rotation.y=.22; phoneGroup.scale.setScalar(1.12);
  const phoneBody=new THREE.Mesh(new THREE.BoxGeometry(5.25,9.3,.45),new THREE.MeshStandardMaterial({color:0x091b2b,roughness:.48,metalness:.38})); phoneBody.castShadow=true; phoneGroup.add(phoneBody);
  const phoneEdge=new THREE.Mesh(new THREE.BoxGeometry(5.55,9.6,.38),new THREE.MeshStandardMaterial({color:0x18344f,roughness:.32,metalness:.5,transparent:true,opacity:.8})); phoneEdge.position.z=-.05; phoneEdge.castShadow=true; phoneGroup.add(phoneEdge);

  const phoneCanvas=document.createElement('canvas'); phoneCanvas.width=620; phoneCanvas.height=1080;
  const phoneCtx=phoneCanvas.getContext('2d');
  const phoneTex=new THREE.CanvasTexture(phoneCanvas); phoneTex.colorSpace=THREE.SRGBColorSpace;
  const screen=new THREE.Mesh(new THREE.PlaneGeometry(4.8,8.75),new THREE.MeshBasicMaterial({map:phoneTex})); screen.position.z=.235; phoneGroup.add(screen);

  function drawMiniEcg(ctx,x,y,w,h,color='#ff4d67',boost=1){
    ctx.save(); ctx.strokeStyle='rgba(10,31,51,.10)'; ctx.lineWidth=1;
    for(let i=0;i<5;i++){ctx.beginPath(); ctx.moveTo(x,y+h*i/4); ctx.lineTo(x+w,y+h*i/4); ctx.stroke();}
    for(let i=0;i<8;i++){ctx.beginPath(); ctx.moveTo(x+w*i/7,y); ctx.lineTo(x+w*i/7,y+h); ctx.stroke();}
    const data=[0,.08,.18,.04,0,-.12,.12,1.15*boost,-.55*boost,.22,.08,0,.05,.12,.05,-.08,.1,1.0*boost,-.62*boost,.21,0,-.1,.14,.05,-.04,.16,1.32*boost,-.7*boost,.22,.06,0];
    ctx.strokeStyle=color; ctx.lineWidth=4; ctx.lineJoin='round'; ctx.beginPath();
    data.forEach((v,i)=>{const px=x+w*i/(data.length-1); const py=y+h/2-v*h*.32; if(i===0)ctx.moveTo(px,py); else ctx.lineTo(px,py);});
    ctx.stroke(); ctx.restore();
  }

  function drawPhone(stage,t){
    const ctx=phoneCtx, W=phoneCanvas.width, H=phoneCanvas.height;
    ctx.clearRect(0,0,W,H);
    const grad=ctx.createLinearGradient(0,0,W,H); grad.addColorStop(0,'#f8fcff'); grad.addColorStop(1,'#e6f7f8');
    ctx.fillStyle=grad; roundedRect(ctx,0,0,W,H,46); ctx.fill();
    ctx.fillStyle='#0a1f33'; ctx.font='800 28px system-ui'; ctx.textAlign='left'; ctx.fillText('CVD.AI',38,62);
    ctx.fillStyle='#007c89'; ctx.font='700 18px system-ui'; ctx.fillText('by PulseGuard AI',38,92);
    ctx.textAlign='right'; ctx.font='700 17px system-ui'; ctx.fillStyle='#64748b'; ctx.fillText('ECG early risk alert',W-38,74);
    ctx.strokeStyle='rgba(0,124,137,.16)'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(34,118); ctx.lineTo(W-34,118); ctx.stroke();

    if(stage===1){
      ctx.fillStyle='#0f172a'; ctx.font='900 42px system-ui'; ctx.textAlign='center'; ctx.fillText('Your heart journey',W/2,185);
      ctx.font='600 23px system-ui'; ctx.fillStyle='#475569'; ctx.fillText('Profile → ECG → Risk Result',W/2,225);
      const steps=['1 Enter profile','2 Medical factors','3 Symptoms','4 Analyze ECG','5 View risk result'];
      steps.forEach((s,i)=>{const y=290+i*105; ctx.fillStyle='white'; roundedRect(ctx,58,y,504,74,22); ctx.fill(); ctx.strokeStyle='rgba(0,124,137,.18)'; ctx.stroke(); ctx.fillStyle='#007c89'; ctx.font='800 26px system-ui'; ctx.textAlign='left'; ctx.fillText(s,90,y+47);});
      ctx.fillStyle='#007c89'; roundedRect(ctx,86,860,448,88,28); ctx.fill(); ctx.fillStyle='white'; ctx.font='900 28px system-ui'; ctx.textAlign='center'; ctx.fillText('Start Assessment',W/2,914);
    } else if(stage===2){
      ctx.fillStyle='#0f172a'; ctx.font='900 38px system-ui'; ctx.textAlign='left'; ctx.fillText('Medical Profile',40,178);
      ctx.font='700 20px system-ui'; ctx.fillStyle='#64748b'; ctx.fillText('Step 2/4 + current symptoms',40,212);
      const items=[['Age','67'],['Factors','Smoking, Diabetes, Hypertension'],['Symptoms','Chest pain, Palpitations'],['Profile score','72 / 100']];
      items.forEach((it,i)=>{const y=265+i*120; ctx.fillStyle='white'; roundedRect(ctx,44,y,532,86,22); ctx.fill(); ctx.strokeStyle='rgba(0,124,137,.17)'; ctx.stroke(); ctx.fillStyle='#64748b'; ctx.font='700 18px system-ui'; ctx.textAlign='left'; ctx.fillText(it[0],75,y+30); ctx.fillStyle=i===3?'#007c89':'#0f172a'; ctx.font='900 25px system-ui'; ctx.fillText(it[1],75,y+62);});
      ctx.fillStyle='rgba(0,124,137,.10)'; roundedRect(ctx,60,825,500,125,26); ctx.fill(); ctx.fillStyle='#007c89'; ctx.font='900 27px system-ui'; ctx.fillText('Profile weight: 30%',88,878); ctx.fillStyle='#475569'; ctx.font='700 19px system-ui'; ctx.fillText('ECG stays the highest impact: 70%',88,912);
    } else if(stage===3){
      ctx.fillStyle='#0f172a'; ctx.font='900 38px system-ui'; ctx.textAlign='left'; ctx.fillText('Smartwatch ECG',40,178);
      ctx.font='700 20px system-ui'; ctx.fillStyle='#64748b'; ctx.fillText('High Risk ECG sample selected',40,212);
      ctx.fillStyle='white'; roundedRect(ctx,44,254,532,310,28); ctx.fill(); ctx.strokeStyle='rgba(0,124,137,.18)'; ctx.stroke();
      drawMiniEcg(ctx,76,300,468,210,'#ff4d67',1.12+Math.sin(t*4)*.03);
      [['ECG AI Score','88 / 100'],['Heart Rate','124 bpm'],['Rhythm','Irregular'],['Signal Quality','Good']].forEach((it,i)=>{const y=625+i*74; ctx.fillStyle=i===0?'rgba(255,77,103,.11)':'white'; roundedRect(ctx,54,y,512,54,18); ctx.fill(); ctx.fillStyle='#64748b'; ctx.font='700 17px system-ui'; ctx.textAlign='left'; ctx.fillText(it[0],78,y+34); ctx.fillStyle=i===0?'#ff4d67':'#0f172a'; ctx.font='900 22px system-ui'; ctx.textAlign='right'; ctx.fillText(it[1],540,y+34);});
    } else if(stage===4){
      ctx.fillStyle='#0f172a'; ctx.font='900 37px system-ui'; ctx.textAlign='left'; ctx.fillText('AI Processing',40,178);
      const pipes=['Median filtering','Butterworth filter','Wavelet denoising','R-peaks + RR/QRS','LSTM prediction'];
      pipes.forEach((p,i)=>{const y=250+i*105; const active=(Math.floor((t-14)*1.45)%5)>=i; ctx.fillStyle=active?'#007c89':'white'; roundedRect(ctx,54,y,512,70,22); ctx.fill(); ctx.fillStyle=active?'white':'#0f172a'; ctx.font='900 23px system-ui'; ctx.textAlign='left'; ctx.fillText(p,84,y+45);});
      ctx.fillStyle='rgba(0,124,137,.10)'; roundedRect(ctx,70,845,480,88,24); ctx.fill(); ctx.fillStyle='#007c89'; ctx.font='900 27px system-ui'; ctx.fillText('Backend-ready: POST /predict',96,900);
    } else if(stage===5){
      const finalScore=(88*.70+72*.30).toFixed(1);
      ctx.fillStyle='rgba(255,77,103,.11)'; roundedRect(ctx,44,150,532,225,32); ctx.fill(); ctx.strokeStyle='rgba(255,77,103,.38)'; ctx.stroke();
      ctx.fillStyle='#ff4d67'; ctx.font='900 44px system-ui'; ctx.textAlign='center'; ctx.fillText('High Risk Alert',W/2,225);
      ctx.fillStyle='#0f172a'; ctx.font='900 34px system-ui'; ctx.fillText(`${finalScore} / 100`,W/2,280);
      ctx.fillStyle='#475569'; ctx.font='700 20px system-ui'; ctx.fillText('Urgent medical review recommended',W/2,322);
      const rows=[['ECG AI Score','88 × 70%','61.6'],['Profile Score','72 × 30%','21.6'],['Final Score','weighted total',finalScore]];
      rows.forEach((r,i)=>{const y=430+i*120; ctx.fillStyle='white'; roundedRect(ctx,50,y,520,82,22); ctx.fill(); ctx.fillStyle='#64748b'; ctx.font='700 18px system-ui'; ctx.textAlign='left'; ctx.fillText(r[0],78,y+30); ctx.fillStyle=i===2?'#ff4d67':'#007c89'; ctx.font='900 27px system-ui'; ctx.fillText(r[2],78,y+64); ctx.fillStyle='#0f172a'; ctx.font='800 20px system-ui'; ctx.textAlign='right'; ctx.fillText(r[1],540,y+52);});
      ctx.fillStyle='rgba(15,23,42,.05)'; roundedRect(ctx,52,850,516,90,22); ctx.fill(); ctx.fillStyle='#475569'; ctx.font='700 18px system-ui'; ctx.textAlign='center'; ctx.fillText('Not a medical diagnosis — consult a healthcare professional.',W/2,902);
    } else {
      ctx.fillStyle='#0f172a'; ctx.font='900 38px system-ui'; ctx.textAlign='left'; ctx.fillText('Admin Dashboard',40,178);
      ctx.fillStyle='#64748b'; ctx.font='700 20px system-ui'; ctx.fillText('PulseGuard AI monitoring overview',40,212);
      const cards=[['Total Users','8','#007c89'],['High Risk','3','#ff4d67'],['Medium','3','#ffb84d'],['Low','2','#25d889']];
      cards.forEach((c,i)=>{const x=44+(i%2)*266, y=260+Math.floor(i/2)*140; ctx.fillStyle='white'; roundedRect(ctx,x,y,244,102,24); ctx.fill(); ctx.fillStyle=c[2]; ctx.font='900 38px system-ui'; ctx.textAlign='left'; ctx.fillText(c[1],x+28,y+48); ctx.fillStyle='#64748b'; ctx.font='800 18px system-ui'; ctx.fillText(c[0],x+28,y+78);});
      ctx.fillStyle='white'; roundedRect(ctx,44,590,532,300,28); ctx.fill(); ctx.fillStyle='#0f172a'; ctx.font='900 24px system-ui'; ctx.fillText('Latest High-Risk Alerts',76,635);
      [['Ahmad Saleh','83/100'],['Mariam Nasser','87/100'],['Khaled Amro','78/100']].forEach((r,i)=>{const y=675+i*66; ctx.fillStyle='rgba(255,77,103,.10)'; roundedRect(ctx,72,y,476,48,18); ctx.fill(); ctx.fillStyle='#0f172a'; ctx.font='800 19px system-ui'; ctx.textAlign='left'; ctx.fillText(r[0],96,y+31); ctx.fillStyle='#ff4d67'; ctx.textAlign='right'; ctx.fillText(r[1],520,y+31);});
    }
    phoneTex.needsUpdate=true;
  }

  // Smartwatch
  const watchGroup=new THREE.Group(); scene.add(watchGroup); watchGroup.position.set(4.95,3.15,4.05); watchGroup.rotation.set(.08,-.45,.04); watchGroup.scale.setScalar(1.24);
  const strapMat=new THREE.MeshStandardMaterial({color:0x0b1f33,roughness:.6,metalness:.15});
  const faceMat=new THREE.MeshStandardMaterial({color:0x061827,roughness:.32,metalness:.55});
  const strap1=new THREE.Mesh(new THREE.BoxGeometry(1.3,4.9,.35),strapMat); strap1.castShadow=true; watchGroup.add(strap1);
  const face=new THREE.Mesh(new THREE.BoxGeometry(2.25,2.25,.52),faceMat); face.castShadow=true; face.position.z=.18; watchGroup.add(face);
  const watchScreenCanvas=document.createElement('canvas'); watchScreenCanvas.width=360; watchScreenCanvas.height=360;
  const watchCtx=watchScreenCanvas.getContext('2d'); const watchTex=new THREE.CanvasTexture(watchScreenCanvas); watchTex.colorSpace=THREE.SRGBColorSpace;
  const watchScreen=new THREE.Mesh(new THREE.PlaneGeometry(1.78,1.78),new THREE.MeshBasicMaterial({map:watchTex})); watchScreen.position.z=.46; watchGroup.add(watchScreen);

  function drawWatch(stage,t){
    const ctx=watchCtx,W=360,H=360; ctx.clearRect(0,0,W,H);
    const g=ctx.createLinearGradient(0,0,W,H); g.addColorStop(0,'#06243b'); g.addColorStop(1,'#0a1f33'); ctx.fillStyle=g; roundedRect(ctx,0,0,W,H,48); ctx.fill();
    ctx.fillStyle='#e6f7f8'; ctx.font='900 26px system-ui'; ctx.textAlign='center'; ctx.fillText('ECG',W/2,58);
    drawMiniEcg(ctx,28,115,304,115,stage>=3?'#ff4d67':'#18c8c8',stage>=3?1.1:0.85);
    ctx.fillStyle=stage>=3?'#ff4d67':'#18c8c8'; ctx.font='900 46px system-ui'; ctx.fillText(stage>=3?'124':'76',W/2,272);
    ctx.fillStyle='rgba(245,251,255,.78)'; ctx.font='800 20px system-ui'; ctx.fillText('bpm',W/2,304);
    watchTex.needsUpdate=true;
  }

  // Server / AI backend
  const serverGroup=new THREE.Group(); scene.add(serverGroup); serverGroup.position.set(6,2,-7); serverGroup.rotation.y=-.28;
  const serverMat=new THREE.MeshStandardMaterial({color:0x123655,roughness:.42,metalness:.45});
  for(let i=0;i<4;i++){const m=new THREE.Mesh(new THREE.BoxGeometry(3.6,.8,2.15),serverMat); m.position.y=i*.95; m.castShadow=true; m.receiveShadow=true; serverGroup.add(m);}
  const serverLedMat=new THREE.MeshBasicMaterial({color:0x25d889});
  for(let i=0;i<4;i++){const led=new THREE.Mesh(new THREE.SphereGeometry(.08,16,16),serverLedMat); led.position.set(1.45,i*.95+.12,1.1); serverGroup.add(led);}

  // Admin dashboard wall
  const adminCanvas=document.createElement('canvas'); adminCanvas.width=1000; adminCanvas.height=620;
  const adminCtx=adminCanvas.getContext('2d'); const adminTex=new THREE.CanvasTexture(adminCanvas); adminTex.colorSpace=THREE.SRGBColorSpace;
  const adminWall=new THREE.Mesh(new THREE.PlaneGeometry(9.8,6.1),new THREE.MeshBasicMaterial({map:adminTex,transparent:true}));
  adminWall.position.set(6.5,5.2,-2); adminWall.rotation.y=-.38; adminWall.visible=false; scene.add(adminWall);
  function drawAdminWall(t){
    const ctx=adminCtx,W=1000,H=620; ctx.clearRect(0,0,W,H);
    ctx.fillStyle='rgba(248,252,255,.96)'; roundedRect(ctx,0,0,W,H,34); ctx.fill();
    ctx.fillStyle='#0a1f33'; ctx.font='900 42px system-ui'; ctx.textAlign='left'; ctx.fillText('Admin Dashboard',48,74);
    ctx.fillStyle='#64748b'; ctx.font='700 22px system-ui'; ctx.fillText('PulseGuard AI overview',48,110);
    const cards=[['Total Users','8','#007c89'],['High Risk','3','#ff4d67'],['Medium','3','#ffb84d'],['Low','2','#25d889']];
    cards.forEach((c,i)=>{const x=48+i*230,y=155; ctx.fillStyle='white'; roundedRect(ctx,x,y,200,118,24); ctx.fill(); ctx.strokeStyle='rgba(15,23,42,.08)'; ctx.stroke(); ctx.fillStyle=c[2]; ctx.font='900 50px system-ui'; ctx.fillText(c[1],x+24,y+58); ctx.fillStyle='#64748b'; ctx.font='800 22px system-ui'; ctx.fillText(c[0],x+24,y+92);});
    ctx.fillStyle='#0a1f33'; ctx.font='900 28px system-ui'; ctx.fillText('Latest alerts',48,344);
    [['Ahmad Saleh','High ECG score + chest pain','83/100'],['Mariam Nasser','Irregular rhythm + previous heart disease','87/100'],['Khaled Amro','High ECG score + diabetes','78/100']].forEach((r,i)=>{const y=378+i*66; ctx.fillStyle='rgba(255,77,103,.10)'; roundedRect(ctx,48,y,890,52,18); ctx.fill(); ctx.fillStyle='#0a1f33'; ctx.font='900 22px system-ui'; ctx.fillText(r[0],78,y+34); ctx.fillStyle='#64748b'; ctx.font='700 20px system-ui'; ctx.fillText(r[1],310,y+34); ctx.fillStyle='#ff4d67'; ctx.font='900 22px system-ui'; ctx.textAlign='right'; ctx.fillText(r[2],910,y+34); ctx.textAlign='left';});
    adminTex.needsUpdate=true;
  }

  // 3D floating ECG line
  const ecgLineGeom=new THREE.BufferGeometry();
  const ecgPoints=140; const ecgPositions=new Float32Array(ecgPoints*3);
  ecgLineGeom.setAttribute('position',new THREE.BufferAttribute(ecgPositions,3));
  const ecgLine=new THREE.Line(ecgLineGeom,new THREE.LineBasicMaterial({color:0xff4d67,transparent:true,opacity:.0}));
  scene.add(ecgLine);
  function ecgValue(u,t,high=false){
    const phase=((u*4.4+t*.85)%1);
    let y=Math.sin((u*18+t)*Math.PI*2)*.035;
    if(phase>.12&&phase<.18) y+=-0.18;
    if(phase>=.18&&phase<.215) y+=high?1.05:.75;
    if(phase>=.215&&phase<.27) y+=high?-0.50:-.34;
    if(phase>.48&&phase<.64) y+=.18*Math.sin((phase-.48)/.16*Math.PI);
    return y;
  }
  function updateEcgLine(t,stage){
    const visible=stage>=3 && stage<=5; ecgLine.material.opacity=visible?.82:0;
    for(let i=0;i<ecgPoints;i++){
      const u=i/(ecgPoints-1); ecgPositions[i*3]=lerp(-3.6,3.6,u); ecgPositions[i*3+1]=3.3+ecgValue(u,t,stage>=3)*1.35; ecgPositions[i*3+2]=6.4;
    }
    ecgLineGeom.attributes.position.needsUpdate=true;
  }

  // Weighted bars group
  const weightGroup=new THREE.Group(); scene.add(weightGroup); weightGroup.position.set(-.8,1.1,-1.8); weightGroup.visible=false;
  function makeBar(y,color,labelValue){
    const group=new THREE.Group(); group.position.y=y;
    const bg=new THREE.Mesh(new THREE.BoxGeometry(6.2,.28,.28),new THREE.MeshStandardMaterial({color:0xffffff,roughness:.35,metalness:.05,transparent:true,opacity:.18})); group.add(bg);
    const bar=new THREE.Mesh(new THREE.BoxGeometry(1,.36,.36),new THREE.MeshStandardMaterial({color,emissive:color,emissiveIntensity:.25,roughness:.35})); bar.position.x=-3.1; bar.userData.value=labelValue; group.add(bar);
    return {group,bar};
  }
  const barEcg=makeBar(1.6,0x18c8c8,.70), barProfile=makeBar(.7,0x24a3ff,.30), barFinal=makeBar(-.3,0xff4d67,.832);
  weightGroup.add(barEcg.group,barProfile.group,barFinal.group);

  // Emergency pulse rings
  const redRing=new THREE.Mesh(new THREE.TorusGeometry(2.6,.10,18,82),new THREE.MeshBasicMaterial({color:0xff4d67,transparent:true,opacity:0}));
  redRing.rotation.x=-Math.PI/2; redRing.position.set(-6,.12,1); scene.add(redRing);
  const tealRing=new THREE.Mesh(new THREE.TorusGeometry(2.1,.08,16,82),new THREE.MeshBasicMaterial({color:0x18c8c8,transparent:true,opacity:0}));
  tealRing.rotation.x=-Math.PI/2; tealRing.position.set(4.8,.12,3.5); scene.add(tealRing);

  // Data packets
  const packets=[];
  for(let i=0;i<18;i++){
    const p=new THREE.Mesh(new THREE.SphereGeometry(.11,16,16),new THREE.MeshStandardMaterial({color:0x18c8c8,emissive:0x18c8c8,emissiveIntensity:.7,roughness:.18}));
    p.visible=false; scene.add(p); packets.push(p);
  }
  function curvePoint(a,b,c,u){const p1=a.clone().lerp(b,u), p2=b.clone().lerp(c,u); return p1.lerp(p2,u);}
  function animatePackets(t,stage){
    packets.forEach((p,i)=>{p.visible=false;});
    if(stage===3){
      packets.forEach((p,i)=>{p.visible=true; const u=((t*.55+i*.12)%1); const a=watchGroup.position.clone().add(new THREE.Vector3(0,.7,0)); const b=new THREE.Vector3(-.6,7.2,5.5); const c=phoneGroup.position.clone().add(new THREE.Vector3(0,.9,0)); p.position.copy(curvePoint(a,b,c,smoothstep(u))); p.material.color.setHex(0x18c8c8); p.material.emissive.setHex(0x18c8c8);});
    } else if(stage===4){
      packets.forEach((p,i)=>{p.visible=true; const u=((t*.52+i*.09)%1); const a=phoneGroup.position.clone().add(new THREE.Vector3(1.2,1.2,0)); const b=new THREE.Vector3(2.2,8.6,-1.8); const c=serverGroup.position.clone().add(new THREE.Vector3(0,2,0)); p.position.copy(curvePoint(a,b,c,smoothstep(u))); p.material.color.setHex(0x24a3ff); p.material.emissive.setHex(0x24a3ff);});
    } else if(stage===6){
      packets.forEach((p,i)=>{p.visible=true; const u=((t*.34+i*.10)%1); const a=serverGroup.position.clone().add(new THREE.Vector3(0,2.2,0)); const b=new THREE.Vector3(4.4,8.4,-4.5); const c=adminWall.position.clone().add(new THREE.Vector3(-1.5,.2,.5)); p.position.copy(curvePoint(a,b,c,smoothstep(u))); p.material.color.setHex(0xff4d67); p.material.emissive.setHex(0xff4d67);});
    }
  }

  const DURATION=30; let playing=false, t0=0;
  function getStage(t){ if(t<4) return 1; if(t<9) return 2; if(t<14) return 3; if(t<19) return 4; if(t<25) return 5; return 6; }
  function cameraForStage(stage,t){
    if(stage===1) return {pos:new THREE.Vector3(-2,16,31),look:new THREE.Vector3(-1,3,1)};
    if(stage===2) return {pos:new THREE.Vector3(-10,8.7,16),look:new THREE.Vector3(-5.8,4,1)};
    if(stage===3) return {pos:new THREE.Vector3(2.5,6.8,15.5),look:new THREE.Vector3(1.8,3.2,4.9)};
    if(stage===4) return {pos:new THREE.Vector3(6.5,8.5,14),look:new THREE.Vector3(5.2,3.4,-5.2)};
    if(stage===5) return {pos:new THREE.Vector3(-4.3,9.2,15),look:new THREE.Vector3(-3.3,3.8,1)};
    return {pos:new THREE.Vector3(8.2,8.6,13.8),look:new THREE.Vector3(5.8,4.6,-2.6)};
  }

  function updateUI(t){
    const stage=getStage(t); setPanel(false,'','',''); setCaption(false,''); setPanelLayout();
    if(stage===1){
      setCaption(true,'البداية: التطبيق يشرح رحلة المستخدم بسرعة، بدون login معقد، ويجهز فكرة أن ECG هو العامل الأقوى في القرار.');
      setPanel(true,'CVD.AI App Flow','User / Admin MVP',`
        <div class="row"><div class="muted">الفكرة</div><div class="val">AI-powered ECG early risk alert</div></div>
        <div class="row"><div class="muted">الأدوار</div><div class="val">Patient + Admin Reviewer</div></div>
        <div class="tags"><span class="tag info">Flutter MVP</span><span class="tag">Material 3</span><span class="tag">Mock ECG API</span></div>`);
    } else if(stage===2){
      setPanelLayout({width:'min(500px, 36vw)', tx:'-18px', ty:'300px'});
      setCaption(true,'هنا المستخدم يدخل profile، عوامل الخطر، والأعراض. هاي المعلومات مهمة، لكنها تمثل 30% فقط من النتيجة النهائية.');
      setPanel(true,'User Medical Information','30% of final score',`
        <div class="row"><div class="muted">Medical factors</div><div class="val">Smoking + Diabetes + Hypertension</div></div>
        <div class="row"><div class="muted">Symptoms</div><div class="val">Chest pain + Palpitations</div></div>
        <div class="row"><div class="muted">Profile score</div><div class="val">72 / 100</div></div>
        <div class="bar"><span style="width:72%"></span></div>
        <div class="tags"><span class="tag info">Profile Weight: 30%</span><span class="tag">ECG Weight: 70%</span></div>`);
    } else if(stage===3){
      setCaption(true,'مرحلة ECG: الساعة الذكية ترسل عينة ECG. في الديمو نختار High Risk ECG حتى يظهر السيناريو القوي للعرض.');
      setPanel(true,'Smartwatch ECG Sample','High Risk ECG selected',`
        <div class="row"><div class="muted">Prediction preview</div><div class="val">High Risk Pattern</div></div>
        <div class="row"><div class="muted">Heart rate</div><div class="val">124 bpm</div></div>
        <div class="row"><div class="muted">Rhythm</div><div class="val">Irregular</div></div>
        <div class="row"><div class="muted">ECG AI Score</div><div class="val">88 / 100</div></div>
        <div class="bar red"><span style="width:88%"></span></div>`);
    } else if(stage===4){
      setCaption(true,'الجزء التقني: Backend لاحقًا يربط Flutter مع Python core_algorithm.py، وفيه filtering + feature extraction + LSTM prediction.');
      setPanel(true,'AI Backend Pipeline','Prepared for FastAPI /predict',`
        <div class="tags"><span class="tag">Median filter</span><span class="tag">Butterworth</span><span class="tag">Wavelet</span><span class="tag">R-peaks</span><span class="tag">RR intervals</span><span class="tag">QRS features</span><span class="tag info">LSTM</span></div>
        <div class="row"><div class="muted">Input</div><div class="val">Smartwatch ECG signal</div></div>
        <div class="row"><div class="muted">Output</div><div class="val">ecg_ai_score + rhythm + waveform</div></div>`);
    } else if(stage===5){
      setPanelLayout({width:'min(470px, 34vw)', tx:'-18px', ty:'245px'});
      setCaption(true,'أهم لقطة في العرض: النتيجة النهائية لا تعتمد على profile لحاله؛ المعادلة تعطي ECG أعلى وزن: 70% مقابل 30%.');
      setPanel(true,'Weighted Final Risk Score','70% ECG + 30% Profile',`
        <div class="row"><div class="muted">ECG contribution</div><div class="val">88 × 0.70 = 61.6</div></div>
        <div class="row"><div class="muted">Profile contribution</div><div class="val">72 × 0.30 = 21.6</div></div>
        <div class="row"><div class="muted">Final risk score</div><div class="val">83.2 / 100</div></div>
        <div class="bar red"><span style="width:83%"></span></div>
        <div class="tags"><span class="tag bad">High Risk Alert</span><span class="tag">Urgent medical review recommended</span></div>
        <div class="muted">This result is not a medical diagnosis. Please consult a healthcare professional.</div>`);
    } else {
      setPanelLayout({width:'min(500px, 36vw)', tx:'-10px', ty:'-4px'});
      setCaption(true,'النهاية: الأدمن يرى dashboard فيها عدد المستخدمين، نسب الخطر، وآخر high-risk alerts للمراجعة الطبية.');
      setPanel(true,'Admin Monitoring Overview','Dashboard + Alerts',`
        <div class="row"><div class="muted">Total users</div><div class="val">8</div></div>
        <div class="row"><div class="muted">Risk distribution</div><div class="val">High 3 • Medium 3 • Low 2</div></div>
        <div class="row"><div class="muted">Latest alert</div><div class="val">Ahmad Saleh — 83/100</div></div>
        <div class="tags"><span class="tag bad">High-risk alerts</span><span class="tag info">Medical reviewer</span><span class="tag">Mark as reviewed</span></div>`);
    }
  }

  function updateScene(t){
    const stage=getStage(t); timerPill.textContent=formatTime(t);
    drawPhone(stage,t); drawWatch(stage,t); drawAdminWall(t); updateUI(t); updateEcgLine(t,stage); animatePackets(t,stage);

    // visibility / positioning per stage
    adminWall.visible=stage===6;
    weightGroup.visible=stage===5;
    phoneGroup.visible=stage!==6 || t<27.5;
    watchGroup.visible=stage!==6;
    serverGroup.visible=stage>=4;

    // dynamic transforms
    phoneGroup.rotation.y=.22+Math.sin(t*.5)*.015; phoneGroup.position.y=3.95+Math.sin(t*.9)*.05;
    watchGroup.rotation.z=.04+Math.sin(t*1.2)*.025; watchGroup.position.y=3.15+Math.sin(t*.95)*.04;
    serverGroup.position.y=2+Math.sin(t*1.6)*.04;
    halo.material.opacity=.12+Math.sin(t*.8)*.035;
    halo.scale.setScalar(1+Math.sin(t*.7)*.025);

    tealRing.material.opacity=stage===3?(.42*(1-((t*1.6)%1))):0; tealRing.scale.setScalar(1+((t*1.6)%1)*.85);
    redRing.material.opacity=stage===5?(.52*(1-((t*1.45)%1))):0; redRing.scale.setScalar(1+((t*1.45)%1)*.85);

    if(stage===5){
      const k=smoothstep(clamp((t-19)/2.2,0,1));
      [[barEcg,.70],[barProfile,.30],[barFinal,.832]].forEach(([obj,val],i)=>{obj.bar.scale.x=lerp(.01,val*6.2,k); obj.bar.position.x=-3.1+(obj.bar.scale.x/2);});
      weightGroup.rotation.y=-.24+Math.sin(t*.35)*.03;
    }

    const c=cameraForStage(stage,t);
    const drift=new THREE.Vector3(Math.sin(t*.23)*.12,Math.sin(t*.18)*.08,Math.cos(t*.2)*.10);
    camera.position.lerp(c.pos.clone().add(drift),.07); camTarget.lerp(c.look,.07); camera.lookAt(camTarget);
  }

  document.getElementById('playBtn').addEventListener('click',()=>{playing=true; t0=now();});
  document.getElementById('resetBtn').addEventListener('click',()=>{playing=false; updateScene(0);});

  function animate(){
    requestAnimationFrame(animate);
    const t=playing?clamp(now()-t0,0,DURATION):0;
    if(playing && t>=DURATION) playing=false;
    updateScene(t);
    renderer.render(scene,camera);
  }
  animate();

  addEventListener('resize',()=>{renderer.setSize(innerWidth,innerHeight); camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();});
  updateScene(0);
</script>
</body>
</html>
